services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trader_is_training
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: trader
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d trader_is_training"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
